<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>LifeOS</title>
  <meta name="theme-color" content="#080810" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="description" content="LifeOS - Your personal operating system for success" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

  <!-- Favicon -->
  <link rel="icon" type="image/x-icon" href="/LifeOS/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16" href="/LifeOS/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/LifeOS/favicon-32x32.png" />
  
  <!-- Apple Touch Icon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/LifeOS/apple-touch-icon.png" />
  
  <!-- Android Chrome -->
  <link rel="icon" type="image/png" sizes="192x192" href="/LifeOS/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/LifeOS/android-chrome-512x512.png" />
  
  <!-- Web Manifest -->
  <link rel="manifest" href="/LifeOS/site.webmanifest" />
  
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* Default theme tokens (dark). App.jsx overrides these onto :root at
       runtime based on state.theme. Keeping them here means the first paint
       isn't broken if JS is still loading. */
    :root {
      --bg: #080810;
      --text: #F8FAFF;
      --text-muted: rgba(248, 250, 255, 0.50);
      --text-faint: rgba(248, 250, 255, 0.40);
      --card: rgba(255, 255, 255, 0.05);
      --card-mid: rgba(255, 255, 255, 0.08);
      --card-high: rgba(255, 255, 255, 0.12);
      --input: rgba(255, 255, 255, 0.06);
      --border: rgba(255, 255, 255, 0.10);
      --border-high: rgba(255, 255, 255, 0.18);
      --shadow: 0 8px 32px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.08);
      --accent-main: #7C6DFA;
      --accent-main-rgb: 124, 109, 250;
      --orb-opacity: 0.4;
    }

    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body, #root {
      height: 100%;
      width: 100%;
      overflow-x: hidden;
    }

    body {
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      background: var(--bg);
      color: var(--text);
      overscroll-behavior: none;
    }

    /* Prevent zoom on input focus iOS */
    @supports (-webkit-touch-callout: none) {
      input, select, textarea {
        font-size: 16px !important;
      }
    }

    /* Glass input base */
    input, select, textarea {
      outline: none;
      color-scheme: dark;
    }

    input[type="number"]::-webkit-inner-spin-button,
    input[type="number"]::-webkit-outer-spin-button {
      opacity: 0.3;
    }

    input[type="color"] {
      cursor: pointer;
    }

    input[type="time"]::-webkit-calendar-picker-indicator,
    input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(0.7);
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 2px; height: 2px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    /* Global keyframes */
    @keyframes pulse-ring {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(1.08); }
    }

    @keyframes blink {
      0%, 80%, 100% { opacity: 0; }
      40% { opacity: 1; }
    }

    @keyframes shimmer {
      0% { background-position: -200% center; }
      100% { background-position: 200% center; }
    }

    @keyframes float {
      0%, 100% { transform: translateY(0px); }
      50% { transform: translateY(-8px); }
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 20px rgba(124, 109, 250, 0.3); }
      50% { box-shadow: 0 0 40px rgba(124, 109, 250, 0.6); }
    }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      20% { transform: translateX(-6px); }
      40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); }
      80% { transform: translateX(4px); }
    }

    .pulse { animation: pulse-ring 2s ease-in-out infinite; }
    .blink { animation: blink 1.4s infinite; }
    .float { animation: float 4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
